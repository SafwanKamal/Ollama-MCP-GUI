<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Dark Mode App Background Gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E293B" />
      <stop offset="50%" stop-color="#0F172A" />
      <stop offset="100%" stop-color="#020617" />
    </linearGradient>

    <!-- Vibrant AI Llama Stroke Gradient -->
    <linearGradient id="llama-grad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#06B6D4" />   <!-- Cyan -->
      <stop offset="50%" stop-color="#8B5CF6" />   <!-- Violet -->
      <stop offset="100%" stop-color="#EC4899" />  <!-- Pink -->
    </linearGradient>

    <!-- MCP Connection Lines Gradient -->
    <linearGradient id="mcp-path" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06B6D4" stop-opacity="0.1" />
      <stop offset="50%" stop-color="#8B5CF6" stop-opacity="0.6" />
      <stop offset="100%" stop-color="#EC4899" stop-opacity="0.1" />
    </linearGradient>

    <!-- Glowing Core Radial Gradient -->
    <radialGradient id="core-grad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="25%" stop-color="#C084FC" />
      <stop offset="100%" stop-color="#4C1D95" />
    </radialGradient>

    <!-- Canvas Grid Pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#FFFFFF" stroke-opacity="0.03" stroke-width="1"/>
    </pattern>

    <!-- Universal Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    
    <!-- Subtle Node Glow -->
    <filter id="node-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <!-- App Icon Squircle Clip Path -->
    <clipPath id="app-clip">
      <rect width="512" height="512" rx="115" />
    </clipPath>
  </defs>

  <!-- =============================== -->
  <!-- 1. BASE GUI SHAPE & BACKGROUND  -->
  <!-- =============================== -->
  <g clip-path="url(#app-clip)">
    <!-- Main Background -->
    <rect width="512" height="512" fill="url(#bg-grad)" />
    
    <!-- GUI Canvas Grid -->
    <rect width="512" height="512" fill="url(#grid)" />

    <!-- =============================== -->
    <!-- 2. MCP NETWORK & CONTEXT NODES  -->
    <!-- =============================== -->
    <!-- Connection Paths -->
    <g stroke="url(#mcp-path)" stroke-width="4" fill="none" stroke-dasharray="8 8" stroke-linecap="round">
      <path d="M 120 180 Q 200 180 285 280" /> <!-- Connects to Calendar Node -->
      <path d="M 420 160 Q 320 160 285 280" /> <!-- Connects to Web Node -->
      <path d="M 440 380 Q 340 380 285 280" /> <!-- Connects to Database Node -->
      <path d="M 100 420 Q 200 420 285 280" /> <!-- Connects to Terminal Node -->
    </g>

    <!-- Floating Context Nodes (Actual MCP Tools) -->
    <g filter="url(#node-glow)">
      
      <!-- Calendar / Scheduling Tool -->
      <g stroke="#06B6D4" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round">
        <rect x="105" y="167" width="30" height="26" rx="4" />
        <line x1="105" y1="176" x2="135" y2="176" />
        <line x1="113" y1="163" x2="113" y2="171" />
        <line x1="127" y1="163" x2="127" y2="171" />
      </g>

      <!-- Web / API Tool (Globe) -->
      <g stroke="#F43F5E" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="420" cy="160" r="15" />
        <ellipse cx="420" cy="160" rx="6" ry="15" />
        <line x1="405" y1="160" x2="435" y2="160" />
      </g>

      <!-- Database / Memory Tool -->
      <g stroke="#10B981" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round">
        <ellipse cx="440" cy="374" rx="15" ry="5" />
        <path d="M 425 374 V 390 C 425 396 455 396 455 390 V 374" />
        <path d="M 425 382 C 425 388 455 388 455 382" />
      </g>

      <!-- Terminal / Code Execution Tool -->
      <g stroke="#F59E0B" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round">
        <rect x="85" y="408" width="30" height="24" rx="3" />
        <polyline points="91,414 97,420 91,426" />
        <line x1="102" y1="426" x2="110" y2="426" />
      </g>

    </g>

    <!-- =============================== -->
    <!-- 3. THE OLLAMA AI CORE           -->
    <!-- =============================== -->
    <!-- Stylized Geometric Llama Outline -->
    <!-- Represents the Model acting as the shell for the context -->
    <path d="M 215 512 
             L 215 320 
             L 155 310 
             C 135 300, 135 250, 155 250 
             L 215 240 
             L 235 120 
             L 265 180 
             L 295 120 
             L 315 190 
             C 355 220, 375 270, 375 340 
             L 375 512"
          fill="none" 
          stroke="url(#llama-grad)" 
          stroke-width="26" 
          stroke-linecap="round" 
          stroke-linejoin="round" 
          filter="url(#glow)"/>

    <!-- Central MCP Processing Core (The "Brain") -->
    <!-- Positioned where the network nodes converge inside the Llama -->
    <circle cx="285" cy="280" r="20" fill="url(#core-grad)" filter="url(#glow)" />
    <circle cx="285" cy="280" r="6" fill="#FFFFFF" />

    <!-- Glassmorphism Highlight / Sheen -->
    <path d="M 0 0 L 512 0 L 512 200 L 0 80 Z" fill="#FFFFFF" fill-opacity="0.04" pointer-events="none" />
  </g>

  <!-- Outer Border to define the Squircle edge cleanly on all backgrounds -->
  <rect width="510" height="510" x="1" y="1" rx="114" fill="none" stroke="#334155" stroke-width="2" />
</svg>

